<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Relatorios | LocaGames Univap</title>
  <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>
  <main class="container-fluid page-shell">
    <div class="mb-4">
      <h1 class="section-title">Relatorios PDF</h1>
      <p class="section-subtitle">Arquivos para apresentar dados de jogos e emprestimos.</p>
    </div>
    <div class="row g-3">
      <div class="col-md-6">
        <section class="app-card p-4 h-100">
          <h2 class="h5">Relatorio de jogos</h2>
          <p class="text-muted">Lista acervo, plataformas, generos, valores e estoque.</p>
          <button class="btn btn-primary" id="btnPdfJogos"><i data-lucide="file-text"></i>Gerar PDF</button>
        </section>
      </div>
      <div class="col-md-6">
        <section class="app-card p-4 h-100">
          <h2 class="h5">Relatorio de emprestimos</h2>
          <p class="text-muted">Lista reservas, retiradas, devolucoes, multas e totais.</p>
          <button class="btn btn-primary" id="btnPdfEmprestimos"><i data-lucide="file-text"></i>Gerar PDF</button>
        </section>
      </div>
    </div>
  </main>
  <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="/vendor/lucide/lucide.min.js"></script>
  <script type="module" src="../assets/js/relatorios.js"></script>
</body>
</html>
