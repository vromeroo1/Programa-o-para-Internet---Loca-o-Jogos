<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Categorias | LocaGames Univap</title>
  <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>
  <main class="container-fluid page-shell">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
      <div>
        <h1 class="section-title">Categorias</h1>
        <p class="section-subtitle">Cadastro usado no relacionamento 1:N com jogos.</p>
      </div>
      <button class="btn btn-dark" id="btnNovaCategoria"><i data-lucide="plus"></i>Nova categoria</button>
    </div>

    <section class="app-card p-3 mb-3">
      <form id="formFiltro" class="row g-2 align-items-end">
        <div class="col-md-5">
          <label class="form-label" for="busca">Pesquisar</label>
          <input class="form-control" id="busca" name="busca" placeholder="Nome ou descricao">
        </div>
        <div class="col-md-auto">
          <button class="btn btn-outline-dark" type="submit"><i data-lucide="search"></i>Filtrar</button>
        </div>
      </form>
    </section>

    <section class="app-card p-3">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead><tr><th>Nome</th><th>Descricao</th><th class="text-end">Jogos</th><th class="text-end">Acoes</th></tr></thead>
          <tbody id="tabelaCategorias"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal fade" id="modalCategoria" tabindex="-1">
    <div class="modal-dialog">
      <form class="modal-content needs-validation" id="formCategoria" novalidate>
        <div class="modal-header">
          <h2 class="modal-title h5" id="tituloModal">Categoria</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="categoriaId">
          <div class="mb-3">
            <label class="form-label" for="nome">Nome</label>
            <input class="form-control" id="nome" name="nome" required maxlength="80">
            <div class="invalid-feedback">Informe o nome da categoria.</div>
          </div>
          <div class="mb-3">
            <label class="form-label" for="descricao">Descricao</label>
            <textarea class="form-control" id="descricao" name="descricao" rows="3" maxlength="255"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-dark"><i data-lucide="save"></i>Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="/vendor/lucide/lucide.min.js"></script>
  <script type="module" src="../assets/js/categorias.js"></script>
</body>
</html>
