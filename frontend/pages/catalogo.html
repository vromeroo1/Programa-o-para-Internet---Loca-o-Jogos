<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catalogo | ProGames</title>
  <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>
  <main class="container-fluid page-shell">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
      <div>
        <h1 class="section-title">Catalogo da locadora</h1>
      </div>
      <div class="pill-tabs" role="group" aria-label="Tipo de jogo">
        <button class="btn btn-sm active" type="button" data-tipo-tab="">Todos</button>
        <button class="btn btn-sm" type="button" data-tipo-tab="videogame">Videogames</button>
        <button class="btn btn-sm" type="button" data-tipo-tab="boardgame">Board games</button>
      </div>
    </div>

    <section class="app-card p-3 mb-3">
      <form id="formFiltroCatalogo" class="row g-2 align-items-end">
        <div class="col-lg-4">
          <label class="form-label" for="busca">Pesquisar</label>
          <input class="form-control" id="busca" placeholder="Titulo, descricao ou plataforma">
        </div>
        <div class="col-lg-3">
          <label class="form-label" for="plataformaFiltro">Plataforma</label>
          <select class="form-select" id="plataformaFiltro">
            <option value="">Todas</option>
            <option>PS5</option>
            <option>Xbox Series X|S</option>
            <option>Nintendo Switch</option>
            <option>Nintendo Switch 2</option>
            <option>Board Game</option>
          </select>
        </div>
        <div class="col-lg-3">
          <label class="form-label" for="categoriaFiltro">Genero</label>
          <select class="form-select" id="categoriaFiltro"></select>
        </div>
        <div class="col-lg-auto">
          <button class="btn btn-primary" type="submit"><i data-lucide="search"></i>Filtrar</button>
        </div>
      </form>
    </section>

    <section id="catalogoGrid" class="catalog-grid"></section>
  </main>

  <div class="modal fade" id="modalReserva" tabindex="-1">
    <div class="modal-dialog">
      <form class="modal-content needs-validation" id="formReserva" novalidate>
        <div class="modal-header">
          <h2 class="modal-title h5">Solicitar reserva</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="jogoReservaId">
          <input type="hidden" id="valorDiariaReserva">
          <p class="mb-3" id="jogoReservaTitulo"></p>
          <label class="form-label" for="dataPrevista">Data prevista de devolucao</label>
          <input type="date" class="form-control" id="dataPrevista" required>
          <div class="invalid-feedback">Informe a data prevista.</div>
          <div class="app-card p-3 mt-3" id="resumoReserva"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary"><i data-lucide="calendar-check"></i>Reservar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="/vendor/lucide/lucide.min.js"></script>
  <script type="module" src="../assets/js/catalogo.js"></script>
</body>
</html>
