<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Importacao e Exportacao | LocaGames Univap</title>
  <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>
  <main class="container-fluid page-shell">
    <div class="mb-4">
      <h1 class="section-title">Importacao e exportacao</h1>
      <p class="section-subtitle">Movimente dados JSON para demonstrar integracao e persistencia.</p>
    </div>
    <div class="row g-3">
      <div class="col-lg-6">
        <section class="app-card p-4 h-100">
          <h2 class="h5">Exportar JSON</h2>
          <label class="form-label" for="entidadeExportar">Entidade</label>
          <select class="form-select mb-3" id="entidadeExportar">
            <option value="usuarios">Usuarios</option>
            <option value="categorias">Categorias</option>
            <option value="jogos">Jogos</option>
            <option value="emprestimos">Emprestimos</option>
          </select>
          <button class="btn btn-primary" id="btnExportarJson"><i data-lucide="download"></i>Exportar</button>
        </section>
      </div>
      <div class="col-lg-6">
        <section class="app-card p-4 h-100">
          <h2 class="h5">Importar JSON</h2>
          <form id="formImportar">
            <label class="form-label" for="entidadeImportar">Entidade</label>
            <select class="form-select mb-3" id="entidadeImportar">
              <option value="usuarios">Usuarios</option>
              <option value="categorias">Categorias</option>
              <option value="jogos">Jogos</option>
              <option value="emprestimos">Emprestimos</option>
            </select>
            <label class="form-label" for="arquivoJson">Arquivo JSON</label>
            <input type="file" class="form-control mb-3" id="arquivoJson" accept="application/json" required>
            <button class="btn btn-primary" type="submit"><i data-lucide="upload"></i>Importar</button>
          </form>
        </section>
      </div>
    </div>
  </main>
  <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="/vendor/lucide/lucide.min.js"></script>
  <script type="module" src="../assets/js/importacao.js"></script>
</body>
</html>
